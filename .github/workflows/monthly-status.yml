name: Monthly Status Email

on:
  schedule:
    # Run at 14:00 UTC on the 1st of every month
    # = 06:00 Pacific (PST) / 07:00 PDT
    - cron: '0 14 1 * *'
  # Also allow manual triggering from the Actions tab for testing
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate and send status email
        env:
          GMAIL_USER: jssbox@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DEST_EMAIL: jssbox@gmail.com
        run: python3 scripts/monthly_status.py
